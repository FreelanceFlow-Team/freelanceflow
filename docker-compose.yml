services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freelanceflow_dev
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - '3010:3010'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/freelanceflow_dev
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-long-random-string}
      PORT: 3010
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      EMAIL_FROM: noreply@freelanceflow.app
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  db_data:
